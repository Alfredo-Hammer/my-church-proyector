<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyector - GloryView</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: white;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ✨ ESTILOS PARA HIMNOS (existente) */
    #himno {
      font-size: 2rem;
      padding: 2rem;
      color: white;
      background-color: black;
      white-space: pre-line;
      text-align: center;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    /* ✨ ESTILOS PARA MULTIMEDIA (nuevo) */
    .multimedia-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .multimedia-content {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    audio {
      width: 80%;
      max-width: 600px;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .audio-display {
      text-align: center;
      color: white;
      padding: 50px;
    }

    .audio-display h1 {
      font-size: 3em;
      margin-bottom: 30px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
    }

    .audio-display .icon {
      font-size: 8em;
      margin-bottom: 30px;
      color: #00bcd4;
    }

    .loading {
      text-align: center;
      color: #00bcd4;
      font-size: 2em;
    }

    .error {
      text-align: center;
      color: #f44336;
      font-size: 1.5em;
      padding: 50px;
    }

    .titulo-archivo {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.8);
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 1.2em;
      z-index: 10;
    }

    /* ✨ CLASES PARA OCULTAR/MOSTRAR CONTENIDO */
    .hidden {
      display: none !important;
    }

    .visible {
      display: flex !important;
    }

    /* Animaciones */
    .fade-in {
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .scale-in {
      animation: scaleIn 0.3s ease-out;
    }

    @keyframes scaleIn {
      from {
        transform: scale(0.9);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- ✨ CONTENEDOR PARA HIMNOS (existente) -->
    <div id="himno" class="hidden"></div>

    <!-- ✨ CONTENEDOR PARA MULTIMEDIA (nuevo) -->
    <div id="multimedia-container" class="multimedia-container hidden">
      <div class="loading">
        <div>🎬</div>
        <p>Esperando contenido multimedia...</p>
      </div>
    </div>
  </div>

  <script>
    console.log('📺 [Proyector] Proyector iniciado');

    let currentMode = 'waiting'; // 'himno', 'multimedia', 'waiting'
    let currentMedia = null;

    // ✨ FUNCIONES PARA CAMBIAR ENTRE MODOS
    function mostrarHimno() {
      document.getElementById('himno').classList.remove('hidden');
      document.getElementById('himno').classList.add('visible');
      document.getElementById('multimedia-container').classList.add('hidden');
      currentMode = 'himno';
      console.log('📺 [Proyector] Modo: Himno');
    }

    function mostrarMultimedia() {
      document.getElementById('himno').classList.add('hidden');
      document.getElementById('multimedia-container').classList.remove('hidden');
      document.getElementById('multimedia-container').classList.add('visible');
      currentMode = 'multimedia';
      console.log('📺 [Proyector] Modo: Multimedia');
    }

    function limpiarProyector() {
      document.getElementById('himno').classList.add('hidden');
      document.getElementById('multimedia-container').classList.add('hidden');

      // Limpiar contenido de himno
      document.getElementById('himno').innerText = '';

      // Limpiar contenido multimedia
      const multimediaContainer = document.getElementById('multimedia-container');
      multimediaContainer.innerHTML = `
                <div class="loading fade-in">
                    <div>🎬</div>
                    <p>Esperando contenido multimedia...</p>
                </div>
            `;

      currentMode = 'waiting';
      currentMedia = null;
      console.log('📺 [Proyector] Proyector limpiado');
    }

    // ✨ FUNCIÓN ORIGINAL PARA HIMNOS (existente)
    window.electron.on("mostrar-himno", (himno) => {
      console.log('📺 [Proyector] Mostrando himno:', himno);
      mostrarHimno();
      document.getElementById("himno").innerText = `${himno.numero}. ${himno.titulo}\n\n${himno.letra}`;
    });    // ✨ NUEVAS FUNCIONES PARA MULTIMEDIA
    function mostrarMultimediaContent(mediaData) {
      console.log('📺 [Proyector] Mostrando multimedia:', mediaData);

      mostrarMultimedia();
      const container = document.getElementById('multimedia-container');
      const { tipo, url, nombre } = mediaData;

      // Limpiar contenido anterior
      container.innerHTML = '';

      try {
        switch (tipo) {
          case 'youtube':
            mostrarYoutube(container, url, nombre);
            break;
          case 'video':
            mostrarVideo(container, url, nombre);
            break;
          case 'audio':
            mostrarAudio(container, url, nombre);
            break;
          case 'imagen':
          case 'image':
            mostrarImagen(container, url, nombre);
            break;
          default:
            mostrarError(container, `Tipo de archivo no soportado: ${tipo}`);
        }

        currentMedia = mediaData;

      } catch (error) {
        console.error('❌ [Proyector] Error mostrando multimedia:', error);
        mostrarError(container, `Error cargando archivo: ${error.message}`);
      }
    }

    function mostrarYoutube(container, url, nombre) {
      const iframe = document.createElement('iframe');
      iframe.src = url;
      iframe.className = 'multimedia-content';
      iframe.style.width = '100%';
      iframe.style.height = '100%';
      iframe.frameBorder = '0';
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
      iframe.allowFullscreen = true;

      iframe.addEventListener('load', () => {
        console.log('✅ [Proyector] YouTube iframe cargado');
      });

      iframe.addEventListener('error', (e) => {
        console.error('❌ [Proyector] Error cargando YouTube:', e);
        mostrarError(container, 'Error cargando video de YouTube');
      });

      container.appendChild(iframe);

      // Agregar título
      if (nombre) {
        const titulo = document.createElement('div');
        titulo.className = 'titulo-archivo fade-in';
        titulo.textContent = nombre;
        container.appendChild(titulo);
      }
    }

    function mostrarVideo(container, url, nombre) {
      const video = document.createElement('video');
      video.src = url;
      video.controls = true;
      video.autoplay = true;
      video.className = 'multimedia-content fade-in';

      video.addEventListener('loadstart', () => {
        console.log('📺 [Proyector] Cargando video...');
      });

      video.addEventListener('canplay', () => {
        console.log('✅ [Proyector] Video listo para reproducir');
      });

      video.addEventListener('error', (e) => {
        console.error('❌ [Proyector] Error cargando video:', e);
        mostrarError(container, 'Error cargando video');
      });

      container.appendChild(video);

      // Agregar título
      if (nombre) {
        const titulo = document.createElement('div');
        titulo.className = 'titulo-archivo fade-in';
        titulo.textContent = nombre;
        container.appendChild(titulo);
      }
    }

    function mostrarAudio(container, url, nombre) {
      const audioContainer = document.createElement('div');
      audioContainer.className = 'audio-display fade-in';

      audioContainer.innerHTML = `
                <div class="icon">🎵</div>
                <h1>${nombre || 'Audio'}</h1>
                <p>Reproduciendo archivo de audio</p>
            `;

      const audio = document.createElement('audio');
      audio.src = url;
      audio.controls = true;
      audio.autoplay = true;
      audio.className = 'multimedia-content';

      audio.addEventListener('error', (e) => {
        console.error('❌ [Proyector] Error cargando audio:', e);
        mostrarError(container, 'Error cargando audio');
        return;
      });

      audioContainer.appendChild(audio);
      container.appendChild(audioContainer);
    }

    function mostrarImagen(container, url, nombre) {
      const img = document.createElement('img');
      img.src = url;
      img.alt = nombre || 'Imagen';
      img.className = 'multimedia-content scale-in';

      img.addEventListener('load', () => {
        console.log('✅ [Proyector] Imagen cargada exitosamente');
      });

      img.addEventListener('error', (e) => {
        console.error('❌ [Proyector] Error cargando imagen:', e);
        mostrarError(container, 'Error cargando imagen');
      });

      container.appendChild(img);

      // Agregar título
      if (nombre) {
        const titulo = document.createElement('div');
        titulo.className = 'titulo-archivo fade-in';
        titulo.textContent = nombre;
        container.appendChild(titulo);
      }
    }

    function mostrarError(container, mensaje) {
      container.innerHTML = `
                <div class="error fade-in">
                    <div style="font-size: 3em; margin-bottom: 20px;">❌</div>
                    <p>${mensaje}</p>
                </div>
            `;
    }

    // ✨ ESCUCHAR EVENTOS DE MULTIMEDIA
    window.electron.on("mostrar-multimedia", (mediaData) => {
      mostrarMultimediaContent(mediaData);
    });

    window.electron.on("limpiar-proyector", () => {
      limpiarProyector();
    });

    // ✨ CONTROLES DE TECLADO
    document.addEventListener('keydown', (e) => {
      switch (e.key) {
        case 'Escape':
          limpiarProyector();
          break;
        case 'F11':
          // Toggle fullscreen si es necesario
          break;
        case ' ': // Spacebar
          if (currentMode === 'multimedia' && currentMedia && currentMedia.tipo === 'video') {
            const video = document.querySelector('video');
            if (video) {
              if (video.paused) {
                video.play();
              } else {
                video.pause();
              }
            }
          }
          e.preventDefault();
          break;
        case 'h': // Tecla H para mostrar/ocultar himnos
        case 'H':
          if (currentMode === 'himno') {
            limpiarProyector();
          }
          break;
        case 'm': // Tecla M para multimedia
        case 'M':
          if (currentMode === 'multimedia') {
            limpiarProyector();
          }
          break;
      }
    });

    // Inicializar en modo espera
    limpiarProyector();

    console.log('✅ [Proyector] Proyector listo - Soporta himnos y multimedia');
  </script>
</body>

</html>
